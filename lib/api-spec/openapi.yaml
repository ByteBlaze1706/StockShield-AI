openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: StockShield AI - Stock fraud detection and analysis API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stocks
    description: Stock search and data operations
  - name: analysis
    description: AI fraud analysis operations
  - name: alerts
    description: Suspicious activity alerts
  - name: watchlist
    description: User watchlist operations
  - name: chat
    description: AI chatbot operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /stocks/search:
    get:
      operationId: searchStocks
      tags: [stocks]
      summary: Search stocks by name or ticker
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of matching stocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockSummary"

  /stocks/{ticker}:
    get:
      operationId: getStock
      tags: [stocks]
      summary: Get stock details with price history
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stock detail with price history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /stocks/{ticker}/analysis:
    get:
      operationId: getStockAnalysis
      tags: [analysis]
      summary: Get AI fraud risk analysis for a stock
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: AI-generated fraud analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FraudAnalysis"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /stocks/{ticker}/sentiment:
    get:
      operationId: getStockSentiment
      tags: [analysis]
      summary: Get sentiment analysis for a stock from news headlines
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sentiment analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SentimentAnalysis"

  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List all suspicious activity alerts
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /alerts/summary:
    get:
      operationId: getAlertsSummary
      tags: [alerts]
      summary: Get dashboard summary of alert counts by severity
      responses:
        "200":
          description: Alert summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertsSummary"

  /watchlist:
    get:
      operationId: listWatchlist
      tags: [watchlist]
      summary: Get user watchlist
      responses:
        "200":
          description: Watchlist items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WatchlistItem"
    post:
      operationId: addToWatchlist
      tags: [watchlist]
      summary: Add a stock to watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistItem"

  /watchlist/{id}:
    delete:
      operationId: removeFromWatchlist
      tags: [watchlist]
      summary: Remove a stock from watchlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /chat/conversations:
    get:
      operationId: listConversations
      tags: [chat]
      summary: List all chat conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [chat]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /chat/conversations/{id}:
    get:
      operationId: getConversation
      tags: [chat]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteConversation
      tags: [chat]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /chat/conversations/{id}/messages:
    get:
      operationId: listMessages
      tags: [chat]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a message (SSE stream response)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [analysis]
      summary: Get overall market risk stats for dashboard
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    StockSummary:
      type: object
      properties:
        ticker:
          type: string
        name:
          type: string
        price:
          type: number
        change:
          type: number
        changePercent:
          type: number
        riskScore:
          type: number
          description: Fraud risk score 0-100
        sector:
          type: string
      required:
        - ticker
        - name
        - price
        - change
        - changePercent
        - riskScore
        - sector

    PricePoint:
      type: object
      properties:
        date:
          type: string
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number
        anomaly:
          type: boolean
      required:
        - date
        - open
        - high
        - low
        - close
        - volume
        - anomaly

    StockDetail:
      type: object
      properties:
        ticker:
          type: string
        name:
          type: string
        price:
          type: number
        change:
          type: number
        changePercent:
          type: number
        marketCap:
          type: number
        volume:
          type: number
        avgVolume:
          type: number
        sector:
          type: string
        description:
          type: string
        riskScore:
          type: number
        priceHistory:
          type: array
          items:
            $ref: "#/components/schemas/PricePoint"
      required:
        - ticker
        - name
        - price
        - change
        - changePercent
        - marketCap
        - volume
        - avgVolume
        - sector
        - description
        - riskScore
        - priceHistory

    RiskFactor:
      type: object
      properties:
        label:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        description:
          type: string
      required:
        - label
        - severity
        - description

    FraudAnalysis:
      type: object
      properties:
        ticker:
          type: string
        riskScore:
          type: number
        riskLevel:
          type: string
          enum: [safe, low, medium, high, critical]
        summary:
          type: string
        riskFactors:
          type: array
          items:
            $ref: "#/components/schemas/RiskFactor"
        recommendation:
          type: string
        generatedAt:
          type: string
          format: date-time
      required:
        - ticker
        - riskScore
        - riskLevel
        - summary
        - riskFactors
        - recommendation
        - generatedAt

    NewsHeadline:
      type: object
      properties:
        title:
          type: string
        source:
          type: string
        sentiment:
          type: string
          enum: [positive, neutral, negative]
        publishedAt:
          type: string
      required:
        - title
        - source
        - sentiment
        - publishedAt

    SentimentAnalysis:
      type: object
      properties:
        ticker:
          type: string
        overallSentiment:
          type: string
          enum: [positive, neutral, negative]
        score:
          type: number
          description: Sentiment score -1 to 1
        headlines:
          type: array
          items:
            $ref: "#/components/schemas/NewsHeadline"
        summary:
          type: string
      required:
        - ticker
        - overallSentiment
        - score
        - headlines
        - summary

    Alert:
      type: object
      properties:
        id:
          type: integer
        ticker:
          type: string
        stockName:
          type: string
        type:
          type: string
          enum: [volume_spike, price_manipulation, insider_trading, wash_trading, pump_and_dump]
        severity:
          type: string
          enum: [low, medium, high, critical]
        description:
          type: string
        detectedAt:
          type: string
          format: date-time
        riskScore:
          type: number
      required:
        - id
        - ticker
        - stockName
        - type
        - severity
        - description
        - detectedAt
        - riskScore

    AlertsSummary:
      type: object
      properties:
        total:
          type: integer
        critical:
          type: integer
        high:
          type: integer
        medium:
          type: integer
        low:
          type: integer
        recentCount:
          type: integer
          description: Alerts in the last 24 hours
      required:
        - total
        - critical
        - high
        - medium
        - low
        - recentCount

    WatchlistItem:
      type: object
      properties:
        id:
          type: integer
        ticker:
          type: string
        stockName:
          type: string
        addedAt:
          type: string
          format: date-time
        riskScore:
          type: number
        currentPrice:
          type: number
        change:
          type: number
      required:
        - id
        - ticker
        - stockName
        - addedAt
        - riskScore
        - currentPrice
        - change

    WatchlistInput:
      type: object
      properties:
        ticker:
          type: string
        stockName:
          type: string
      required:
        - ticker
        - stockName

    Conversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    ConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    ChatMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    ChatMessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    ConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    DashboardStats:
      type: object
      properties:
        totalStocksMonitored:
          type: integer
        highRiskCount:
          type: integer
        activeAlerts:
          type: integer
        avgMarketRiskScore:
          type: number
        topRiskyStocks:
          type: array
          items:
            $ref: "#/components/schemas/StockSummary"
        recentAlerts:
          type: array
          items:
            $ref: "#/components/schemas/Alert"
      required:
        - totalStocksMonitored
        - highRiskCount
        - activeAlerts
        - avgMarketRiskScore
        - topRiskyStocks
        - recentAlerts
